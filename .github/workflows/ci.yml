name: CI
on:
  push:
    branches: [modernize]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
      - run: dotnet restore ConnectFour.slnx
      - name: Verify formatting
        run: dotnet format ConnectFour.slnx --verify-no-changes --severity warn
      - run: dotnet build ConnectFour.slnx --configuration Release --no-restore /warnaserror
      - name: Test with coverage
        run: >
          dotnet test ConnectFour.slnx --configuration Release --no-build
          --logger "trx;LogFileName=results.trx"
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings
          --results-directory TestResults
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults/**/*
      - name: Coverage summary
        shell: pwsh
        run: |
          $file = Get-ChildItem -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if (-not $file) { Write-Error "No coverage file found"; exit 1 }
          [xml]$cov = Get-Content $file.FullName
          $rate = [double]$cov.coverage.'line-rate' * 100
          Write-Host ("Line coverage: {0:F1}%" -f $rate)
          if ($rate -lt 90) { Write-Error "Coverage {0:F1}% is below the 90% threshold" -f $rate; exit 1 }

  coverage-comment:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: test-results
          path: TestResults
      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/**/coverage.cobertura.xml
          format: markdown
          output: both
          badge: true
          thresholds: '90 95'
          fail_below_min: true
      - name: Post coverage comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          recreate: true
          path: code-coverage-results.md
